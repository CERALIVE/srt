name: QEMU to run s390x-focal

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  Tests:
    runs-on: ubuntu-latest
    steps:
    - name: Setup multiarch/qemu-user-static
      run: |
        docker run --rm --privileged multiarch/qemu-user-static:register --reset
    - name: ubuntu-core:s390x-focal
      uses: docker://multiarch/ubuntu-core:s390x-focal
      with:
        args: >
          bash -c
          "uname -a &&
          lscpu | grep Endian 
          "
    - name: Checkout
      uses: actions/checkout@v7
    - name: Restore ccache
      uses: actions/cache/restore@v6
      with:
        path: .ccache
        key: srt-ccache-s390x-focal-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'cmake_object_lib_support.c', 'apps/**', 'common/**', 'examples/**', 'haicrypt/**', 'scripts/**', 'srtcore/**', 'test/**', 'testing/**') }}
        restore-keys: srt-ccache-s390x-focal-${{ runner.os }}-${{ runner.arch }}-
    - name: configure
      uses: docker://multiarch/ubuntu-core:s390x-focal
      env:
        CCACHE_DIR: /github/workspace/.ccache
      with:
        args: >
          bash -c
          "apt-get -y update &&
          export DEBIAN_FRONTEND=noninteractive &&
          export TZ=Etc/UTC && 
          apt-get -y install tzdata &&
          uname -a &&
          lscpu | grep Endian &&
          apt-get -y install ccache cmake g++ libssl-dev git &&
          ccache --max-size=200M &&
          ccache --zero-stats &&
          trap 'ccache --show-stats' EXIT &&
          mkdir _build && cd _build &&
          cmake ../ -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DENABLE_ENCRYPTION=ON -DENABLE_UNITTESTS=ON -DENABLE_BONDING=ON -DENABLE_TESTING=ON -DENABLE_EXAMPLES=ON &&
          cmake --build ./ &&
          ./test-srt -disable-ipv6"
    - name: Save ccache
      if: ${{ success() && github.event_name != 'pull_request' }}
      uses: actions/cache/save@v6
      with:
        path: .ccache
        key: srt-ccache-s390x-focal-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'cmake_object_lib_support.c', 'apps/**', 'common/**', 'examples/**', 'haicrypt/**', 'scripts/**', 'srtcore/**', 'test/**', 'testing/**') }}
