name: cxx11

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: windows
    runs-on: windows-latest
    # Skip on PRs - only run on direct pushes to master
    if: github.event_name != 'pull_request'

    steps:
    - uses: actions/checkout@v4
    
    - name: configure
      run: |
        mkdir _build
        cd _build
        cmake ../ -DENABLE_STDCXX_SYNC=ON
        
    - name: build
      run: |
        cd _build
        cmake --build . --config Release
