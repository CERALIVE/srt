name: MacOS

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: C++11 noenc
    runs-on: macos-latest

    steps:
    - name: GoogleTest
      run: |
        brew tap-new Haivision/gt-local
        brew extract --version=1.12.1 --force googletest Haivision/gt-local
        brew trust --formula Haivision/gt-local/googletest@1.12.1
        brew install googletest@1.12.1
        # NOTE: 1.12.1 is the last version that requires C++11; might need update later
        # curl -o googletest.rb https://raw.githubusercontent.com/Homebrew/homebrew-core/23e7fb4dc0cc73facc3772815741e1deb87d6406/Formula/googletest.rb
        # brew install -s googletest.rb
    - uses: actions/checkout@v7
    - name: Configure ccache environment
      run: echo "CCACHE_DIR=$RUNNER_TEMP/ccache" >> "$GITHUB_ENV"
    - name: Restore ccache
      uses: actions/cache/restore@v6
      with:
        path: ${{ runner.temp }}/ccache
        key: srt-ccache-cxx11-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'cmake_object_lib_support.c', 'apps/**', 'common/**', 'haicrypt/**', 'scripts/**', 'srtcore/**', 'test/**', 'testing/**') }}
        restore-keys: srt-ccache-cxx11-${{ runner.os }}-${{ runner.arch }}-
    - name: Set up ccache
      run: |
        brew install ccache
        ccache --max-size=200M
        ccache --zero-stats
    - name: configure
      # CERALIVE: noenc build-only smoke test -- crypto unit tests need a backend, so
      # UNITTESTS is OFF here (as in the Ubuntu MinGW lane); full tests run enc-ON.
      run: |
        mkdir _build && cd _build
        cmake ../ -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DENABLE_STDCXX_SYNC=ON -DENABLE_ENCRYPTION=OFF -DENABLE_UNITTESTS=OFF -DENABLE_BONDING=ON -DUSE_CXX_STD=17
    - name: build
      run: cd _build && cmake --build ./
    - name: Save ccache
      if: ${{ success() && github.event_name != 'pull_request' }}
      uses: actions/cache/save@v6
      with:
        path: ${{ runner.temp }}/ccache
        key: srt-ccache-cxx11-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'cmake_object_lib_support.c', 'apps/**', 'common/**', 'haicrypt/**', 'scripts/**', 'srtcore/**', 'test/**', 'testing/**') }}
    - name: Show ccache statistics
      if: always()
      run: ccache --show-stats
